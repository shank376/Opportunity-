<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Explorer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ===================== ROOT ===================== */
:root{
  --bg:#f6f8fc;
  --text:#111;
  --card:#fff;
  --primary:#4f46e5;
  --shadow:0 10px 30px rgba(0,0,0,0.08);
}

body.dark{
  --bg:#0f172a;
  --text:#fff;
  --card:#1e293b;
  --shadow:0 10px 30px rgba(0,0,0,0.4);
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* ===================== NAV ===================== */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  position:fixed;
  width:100%;
  top:0;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
}

.logo{
  font-weight:700;
  color:var(--primary);
}

/* ===================== HERO ===================== */
.hero{
  padding:120px 20px 60px;
  text-align:center;
}

.hero h1{
  font-size:2.5rem;
}

.search-box{
  margin-top:20px;
}

input,select,button{
  padding:12px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button{
  background:var(--primary);
  color:white;
  cursor:pointer;
}

/* ===================== CARDS ===================== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  box-shadow:var(--shadow);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* ===================== BUTTON ===================== */
.apply{
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:var(--primary);
  color:white;
  border-radius:8px;
}

/* ===================== TOGGLE ===================== */
.toggle{
  cursor:pointer;
  background:transparent;
  color:var(--text);
  font-size:18px;
}

/* ===================== FOOTER ===================== */
footer{
  text-align:center;
  padding:30px;
  margin-top:40px;
  background:var(--card);
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Student Explorer</div>
  <button class="toggle" onclick="toggleTheme()">🌙</button>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Discover Opportunities. Build Your Future.</h1>

  <div class="search-box">
    <input id="search" placeholder="Search opportunities..."/>
    <select id="filter">
      <option value="">All</option>
      <option value="Coding">Coding</option>
      <option value="Scholarship">Scholarship</option>
      <option value="Olympiad">Olympiad</option>
      <option value="Hackathon">Hackathon</option>
      <option value="Research">Research</option>
    </select>
    <button onclick="render()">Search</button>
  </div>
</section>

<!-- RESULTS -->
<section class="grid" id="list"></section>

<!-- FOOTER -->
<footer>
  © 2026 Student Explorer
</footer>

<script>
/* ===================== DATA ===================== */
const data = [
  {
    title:"ISRO YUVIKA Program",
    category:"Research",
    eligibility:"Class 9",
    deadline:"2026-03-15",
    description:"Learn space science with ISRO scientists.",
    link:"#"
  },
  {
    title:"Google Coding Challenge",
    category:"Coding",
    eligibility:"All Students",
    deadline:"2026-06-10",
    description:"Competitive programming contest.",
    link:"#"
  },
  {
    title:"National Science Olympiad",
    category:"Olympiad",
    eligibility:"Class 1-12",
    deadline:"2026-08-20",
    description:"Science reasoning competition.",
    link:"#"
  },
  {
    title:"Smart India Hackathon",
    category:"Hackathon",
    eligibility:"College Students",
    deadline:"2026-09-01",
    description:"Solve real world problems.",
    link:"#"
  },
  {
    title:"INSPIRE Scholarship",
    category:"Scholarship",
    eligibility:"Class 12",
    deadline:"2026-10-10",
    description:"Government science scholarship.",
    link:"#"
  }
];

/* ===================== RENDER ===================== */
function render(){
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  const list = document.getElementById("list");
  list.innerHTML = "";

  data
  .filter(item =>
    item.title.toLowerCase().includes(search) &&
    (filter === "" || item.category === filter)
  )
  .forEach(item => {
    list.innerHTML += `
      <div class="card">
        <h3>${item.title}</h3>
        <p><b>Category:</b> ${item.category}</p>
        <p><b>Eligibility:</b> ${item.eligibility}</p>
        <p><b>Deadline:</b> ${item.deadline}</p>
        <p>${item.description}</p>
        <a class="apply" href="${item.link}">Apply</a>
      </div>
    `;
  });
}

/* ===================== THEME ===================== */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* INIT */
render();
</script>

</body>
</html>
